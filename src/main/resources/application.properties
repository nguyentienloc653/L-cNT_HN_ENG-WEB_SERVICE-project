spring.application.name=DatSanCauLong

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/datsancau?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

jwt.secret=your-secret-key-very-long-at-least-32-chars
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Directory where uploaded images are stored. Relative path is the working directory of the app.
# You can change to an absolute path if needed, e.g. C:/app/uploads/images
imageUploadDir=./uploads/images

